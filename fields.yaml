# 调研字段定义：AI 驱动的内容采集插件管理平台
# detail_level 分层：极简(minimal) → 简要(brief) → 详细(detailed)
# 说明：字段在"竞品与行业分析"视角下组织，兼顾插件系统/爬虫/AI 接入评估

fields:
  # ---- 基本信息 ----
  - name: name
    cn: 名称
    description: 平台/产品名称
    detail_level: 极简
  - name: vendor
    cn: 厂商/团队
    description: 开发方或所属公司
    detail_level: 极简
  - name: founded
    cn: 成立时间
    description: 上线/成立年份，用于判断成熟度与赛道生命周期
    detail_level: 简要
  - name: type
    cn: 类型
    description: SaaS 云 / 开源框架 / 桌面软件 / 开发者平台
    detail_level: 极简
  - name: open_source
    cn: 开源/商业
    description: 许可协议与商业模式前提
    detail_level: 极简
  - name: scale
    cn: 融资/收购/用户规模
    description: 市场地位与成熟度参照
    detail_level: 简要

  # ---- 核心能力 ----
  - name: crawl_capability
    cn: 爬虫能力
    description: 采集方式、JS 渲染、反爬应对、深度/调度能力
    detail_level: 详细
  - name: ai_integration
    cn: AI 集成深度
    description: 模型如何处理爬取内容、结构化/LLM-ready 输出能力
    detail_level: 详细
  - name: plugin_mechanism
    cn: 插件机制
    description: 上架、分发、安装、启停、运行方式
    detail_level: 详细
  - name: user_auth
    cn: 用户/权限体系
    description: 多租户、角色、安装/上传权限边界
    detail_level: 简要

  # ---- 技术栈 ----
  - name: backend
    cn: 后端语言/框架
    description: 后端底座（PHP 框架等）
    detail_level: 简要
  - name: frontend
    cn: 前端
    description: 前端技术栈
    detail_level: 极简
  - name: database
    cn: 数据库
    description: 数据存储（MySQL 等）
    detail_level: 极简
  - name: plugin_runtime
    cn: 插件运行时/沙箱
    description: 插件执行隔离方式（进程/容器/沙箱）
    detail_level: 详细

  # ---- 插件生态 ----
  - name: dev_method
    cn: 插件开发方式
    description: 模板 / SDK / 源码上传、开发门槛
    detail_level: 简要
  - name: publish_review
    cn: 上架审核/安全扫描
    description: 用户可上传插件时的安全门禁与权限最小化
    detail_level: 详细
  - name: extensibility
    cn: 扩展性
    description: 扩展接口标准（MCP / OpenAPI / Webhook / SDK）
    detail_level: 详细
  - name: versioning
    cn: 版本管理
    description: 语义化版本、更新日期展示
    detail_level: 简要

  # ---- 模型支持 ----
  - name: models_supported
    cn: 支持模型
    description: GLM / DeepSeek / GPT 等主流模型覆盖
    detail_level: 简要
  - name: api_protocol
    cn: 接入协议
    description: OpenAI 兼容 / 自定义协议
    detail_level: 简要
  - name: testable
    cn: 是否可在线测试
    description: 对应本平台"模型测试按钮"
    detail_level: 极简

  # ---- 商业化 ----
  - name: business_model
    cn: 商业模式/定价
    description: 订阅 / 按量 Credits / 免费增值 / 市场抽成
    detail_level: 详细
  - name: deployment
    cn: 部署形态
    description: SaaS 云 / 私有化自托管 / 混合
    detail_level: 简要

  # ---- 合规与安全 ----
  - name: compliance
    cn: 合规与反爬策略
    description: robots、代理 IP、数据授权、法律边界（Cookie/登录态采集生命线）
    detail_level: 详细
  - name: sandbox_isolation
    cn: 多租户沙箱隔离
    description: PHP 插件执行隔离、资源限额、权限声明
    detail_level: 详细
  - name: monitoring_log
    cn: 实时监控与日志
    description: 进度/状态/错误实时推送（对应"右侧看日志"）
    detail_level: 简要

  # ---- 借鉴价值 ----
  - name: takeaway
    cn: 对本平台可复用点
    description: 产品形态、商业模式、接口标准、安全底线等可借鉴项
    detail_level: 详细

# 不确定字段（deep 阶段自动填充）
uncertain:
  - 具体定价数字与分成比例（需 deep 阶段核实官网/定价页）
  - 精确用户规模与活跃度（多来自第三方估算，标注来源）
  - PHP 插件沙箱的具体实现方式（容器 vs 进程隔离，依赖技术深搜）
  - MCP 与本平台插件协议的映射成本（需架构深搜）
